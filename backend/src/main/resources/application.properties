spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/vector_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

pgvector.host=${PGVECTOR_HOST:localhost}
pgvector.port=${PGVECTOR_PORT:5433}
pgvector.database=${PGVECTOR_DATABASE:vector_db}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — baseline for existing DBs; AI/embedding tables still via ddl-auto for now
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT (override secret in prod via env; min 32 chars)
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-secret-at-least-32-chars}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:10080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Async document ingest (RabbitMQ). Set false for sync processing without broker.
rag.ingest.async-enabled=${RAG_INGEST_ASYNC:true}
# Concurrent document workers (bounded). Keep modest vs vision/face load.
rag.ingest.worker-concurrency=${RAG_INGEST_WORKER_CONCURRENCY:2}
rag.ingest.worker-max-concurrency=${RAG_INGEST_WORKER_MAX_CONCURRENCY:4}
rag.ingest.worker-prefetch=${RAG_INGEST_WORKER_PREFETCH:1}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Redis (rate limit + identity match cache)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s
# Only StringRedisTemplate is used (rate limit + identity cache); no Redis repositories.
spring.data.redis.repositories.enabled=false

# Rate limiting (Redis fixed window). fail-open=true keeps local dev usable when Redis is down.
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.fail-open=${RATE_LIMIT_FAIL_OPEN:true}
app.rate-limit.chat-send.limit=${RATE_LIMIT_CHAT_SEND:30}
app.rate-limit.chat-send.window-seconds=${RATE_LIMIT_CHAT_WINDOW_SECONDS:60}
app.rate-limit.upload.limit=${RATE_LIMIT_UPLOAD:20}
app.rate-limit.upload.window-seconds=${RATE_LIMIT_UPLOAD_WINDOW_SECONDS:60}

# Identity match cache (expensive face gallery ranking)
app.identity-cache.enabled=${IDENTITY_CACHE_ENABLED:true}
app.identity-cache.ttl-seconds=${IDENTITY_CACHE_TTL_SECONDS:300}
app.identity-cache.key-prefix=identity:match:

# Actuator health (DB, Redis, RabbitMQ auto; face-service custom indicator)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
management.health.rabbit.enabled=true
management.health.db.enabled=true

spring.application.name=rag
logging.level.dev.langchain4j=DEBUG

# LLM + text embeddings: DeepInfra (OpenAI-compatible). Ollama is optional fallback only.
llm.provider=deepinfra
llm.embedding.provider=deepinfra
llm.deepinfra.base-url=https://api.deepinfra.com/v1/openai
llm.deepinfra.api-key=${DEEPINFRA_API_KEY}
llm.deepinfra.chat-model=deepseek-ai/DeepSeek-V3
llm.deepinfra.vision-model=Qwen/Qwen3-VL-30B-A3B-Instruct
llm.deepinfra.embedding-model=Qwen/Qwen3-Embedding-4B
# MRL size for Qwen3-4B (max 2560). Keep ≤2000 for pgvector IVFFlat/HNSW. Changing drops/recreates embeddings table.
llm.deepinfra.embedding-dimensions=1024
# IVFFlat fails on empty tables / dims>2000; sequential scan is fine for small corpora. Enable after re-ingest if needed.
rag.embeddings.use-index=false
rag.embeddings.index-list-size=100
# Interactive chat timeout (planner + answer each use this budget). Vision has a longer budget.
# 30s was too tight under DeepInfra load and produced empty/greeting non-answers with good sources.
llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:90}
llm.vision.timeout-seconds=${LLM_VISION_TIMEOUT_SECONDS:120}
# One bounded vision attempt; failed async jobs remain visible in the DLQ.
llm.vision.max-retries=${LLM_VISION_MAX_RETRIES:0}
llm.temperature=0.1
llm.chat.max-tokens=512
llm.vision.max-tokens=2048

# Optional Ollama (set llm.provider=ollama and/or llm.embedding.provider=ollama)
ollama.base.url=http://localhost:11434
chat.language.model=llama3.1
vision.language.model=minicpm-v
embedding.model=bge-m3

rag.ingestion.max-segment-size=600
rag.ingestion.overlap=100
rag.retrieval.max-results=5
# Qwen3 cosine scores are often lower than BGE-M3; 0.5 over-filtered valid hits.
rag.retrieval.min-score=0.25
rag.retrieval.photo-max-results=20
rag.retrieval.recall-max-results=40
rag.retrieval.graph-max-results=15
rag.retrieval.photo-min-score=0.25
rag.retrieval.lexical-enabled=true
rag.retrieval.lexical-max-results=40
rag.retrieval.lexical-min-token-length=2
rag.retrieval.final-min-score=${RAG_RETRIEVAL_FINAL_MIN_SCORE:0.25}
rag.graph.min-mention-confidence=0.75
rag.graph.min-fact-confidence=0.75
rag.query-planner.llm-fallback=true
rag.visual-match.context-accept-confidence=0.80
rag.visual-match.vision-accept-confidence=0.70
rag.visual-match.max-context-chars=5000
rag.visual-match.max-candidates=50
rag.visual-match.max-vision-analyses=20
rag.visual-retrieval.max-vector-candidates=40
rag.visual-retrieval.min-score=0.15
rag.visual-match.min-uncertain-source-confidence=0.20
rag.rerank.enabled=true
rag.rerank.max-candidates=20
rag.rerank.max-segment-chars=700
rag.chat.memory.max-tokens=5000
rag.max-segment-chars=1500
rag.image-graph.repair-enabled=${RAG_IMAGE_GRAPH_REPAIR_ENABLED:false}

vision.structured.prompt=Analyze the whole image exhaustively and return strictly JSON only, without markdown. Identify every visible living participant (people, animals) without guessing identity or names; use stable labels such as person 1, person 2, animal 1. Capture every visible detail that may answer an unknown future question: appearance (hair, face, clothing, colours, accessories), pose, actions, interactions, objects, readable text, spatial layout, scene/context, lighting, background and approximate bounding boxes. Write all natural-language observations in Polish. For relations between participants and between participants and objects, use explicit open natural-language spatial predicates. Do not invent unreadable text or details that are not visible. Every item in entities MUST be a full JSON object with at least label and type — never a bare string like "person 2". Use this schema: {"entities":[{"label":"person 1","face_anchor_id":"face_1","type":"PERSON","actions":["stoi","patrzy w stronę aparatu"],"objects":["parasol"],"nearby_objects":["stół"],"visual_cues":["blond włosy","niebieska koszula"],"nearby_text":["OPEN"],"bbox":[100,120,220,360]}],"relations":[{"subject_label":"person 1","relation":"z lewej od","object_label":"person 2"},{"subject_label":"person 1","relation":"obok","object_label":"table"}],"scene":"salon","scene_summary":"Szczegółowy opis sceny ze wszystkimi istotnymi detalami.","visible_texts":[{"text":"OPEN","bbox":[10,20,80,50],"near_entity_label":"person 1"}]}.
vision.image.max-width=1600
vision.image.max-height=1600
vision.structured.analyzer-version=${VISION_ANALYZER_VERSION:v6-face-anchored}

face.service.url=${FACE_SERVICE_URL:http://localhost:8001}
face.service.enabled=${FACE_SERVICE_ENABLED:true}
face.match.threshold=${FACE_MATCH_THRESHOLD:0.50}
face.match.suggestion-threshold=${FACE_SUGGESTION_THRESHOLD:0.45}
face.match.min-margin=${FACE_MATCH_MIN_MARGIN:0.08}
face.match.min-det-score=${FACE_MIN_DET_SCORE:0.50}
face.match.batch-cluster-threshold=${FACE_BATCH_CLUSTER_THRESHOLD:0.48}
face.match.vector-search.enabled=${FACE_VECTOR_SEARCH_ENABLED:true}
face.match.vector-search.top-k=${FACE_VECTOR_SEARCH_TOP_K:40}
face.analyzer-version=${FACE_ANALYZER_VERSION:v3-exif-oriented}
identity.llm-matcher.enabled=${IDENTITY_LLM_MATCHER_ENABLED:false}
identity.llm-matcher.max-candidates=${IDENTITY_LLM_MATCHER_MAX_CANDIDATES:2}
identity.description-auto-confirm-threshold=${IDENTITY_DESCRIPTION_AUTO_CONFIRM_THRESHOLD:0.85}
identity.description-suggest-threshold=${IDENTITY_DESCRIPTION_SUGGEST_THRESHOLD:0.60}
identity.description-auto-confirm-min-margin=${IDENTITY_DESCRIPTION_AUTO_CONFIRM_MIN_MARGIN:0.05}
# Cap mentions scored after type/folder/token pre-filter (avoids O(n) full-table scan cost)
identity.heuristic.max-candidates=${IDENTITY_HEURISTIC_MAX_CANDIDATES:40}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
