spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/vector_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

pgvector.host=${PGVECTOR_HOST:localhost}
pgvector.port=${PGVECTOR_PORT:5433}
pgvector.database=${PGVECTOR_DATABASE:vector_db}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.application.name=rag
logging.level.dev.langchain4j=DEBUG

openai.api.key=${OPENAI_API_KEY}
ollama.base.url=http://localhost:11434

chat.language.model=llama3.1
vision.language.model=minicpm-v
embedding.model=bge-m3


llm.provider=openai
llm.embedding.provider=ollama
llm.openai.base-url=https://api.groq.com/openai/v1
llm.openai.chat-model=meta-llama/llama-4-scout-17b-16e-instruct
llm.openai.vision-base-url=https://api.groq.com/openai/v1
llm.openai.vision-model=meta-llama/llama-4-scout-17b-16e-instruct
llm.openai.embedding-base-url=${llm.openai.base-url}
llm.openai.embedding-model=text-embedding-3-small
llm.timeout-minutes=2
llm.temperature=0.1

rag.ingestion.max-segment-size=600
rag.ingestion.overlap=100
rag.retrieval.max-results=5
rag.retrieval.min-score=0.5
rag.retrieval.photo-max-results=20
rag.retrieval.photo-min-score=0.55
rag.visual-match.context-accept-confidence=0.80
rag.visual-match.vision-accept-confidence=0.70
rag.visual-match.max-context-chars=5000
rag.rerank.enabled=true
rag.rerank.max-candidates=20
rag.rerank.max-segment-chars=700
rag.chat.memory.max-tokens=5000
rag.max-segment-chars=1500

vision.structured.prompt=Analyze the whole image and return strictly JSON only, without markdown. Identify every visible human as type PERSON; never guess identity or names, use labels person 1, person 2 in left-to-right order. For every person return actions, objects they hold or interact with, nearby objects, visible appearance cues, readable text located next to them, and an approximate bbox. For every object in objects, include the corresponding action (holding, wearing, using or interacting) in actions when visible; do not put a merely nearby object in objects. Also return the overall scene, a one-sentence scene summary, all clearly readable texts with approximate bboxes, and spatial relations between people. Do not invent unreadable text or details that are not visible. Use this schema: {"entities":[{"label":"person 1","type":"PERSON","actions":["sitting","holding"],"objects":["umbrella"],"nearby_objects":["table"],"visual_cues":["blue shirt"],"nearby_text":["OPEN"],"bbox":[100,120,220,360]}],"relations":[],"scene":"living room","scene_summary":"A person is sitting beside a table.","visible_texts":[{"text":"OPEN","bbox":[10,20,80,50],"near_entity_label":"person 1"}]}. Supported relation values: NEXT_TO, LEFT_OF, RIGHT_OF, IN_FRONT_OF, BEHIND.
vision.image.max-width=1600
vision.image.max-height=1600
vision.structured.analyzer-version=${VISION_ANALYZER_VERSION:v3-visual-assertions}

face.service.url=${FACE_SERVICE_URL:http://localhost:8001}
face.service.enabled=${FACE_SERVICE_ENABLED:true}
face.match.threshold=${FACE_MATCH_THRESHOLD:0.50}
face.match.suggestion-threshold=${FACE_SUGGESTION_THRESHOLD:0.45}
face.match.min-margin=${FACE_MATCH_MIN_MARGIN:0.08}
face.match.min-det-score=${FACE_MIN_DET_SCORE:0.50}
face.match.batch-cluster-threshold=${FACE_BATCH_CLUSTER_THRESHOLD:0.48}
face.match.vector-search.enabled=${FACE_VECTOR_SEARCH_ENABLED:true}
face.match.vector-search.top-k=${FACE_VECTOR_SEARCH_TOP_K:40}
face.analyzer-version=${FACE_ANALYZER_VERSION:v2-person-gated}
identity.llm-matcher.enabled=${IDENTITY_LLM_MATCHER_ENABLED:false}
identity.llm-matcher.max-candidates=${IDENTITY_LLM_MATCHER_MAX_CANDIDATES:2}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
