spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/vector_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

pgvector.host=${PGVECTOR_HOST:localhost}
pgvector.port=${PGVECTOR_PORT:5433}
pgvector.database=${PGVECTOR_DATABASE:vector_db}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.application.name=rag
logging.level.dev.langchain4j=DEBUG

ollama.base.url=http://localhost:11434

chat.language.model=llama3.1
vision.language.model=minicpm-v
embedding.model=bge-m3


llm.provider=deepinfra
llm.embedding.provider=ollama
llm.deepinfra.base-url=https://api.deepinfra.com/v1/openai
llm.deepinfra.api-key=${DEEPINFRA_API_KEY}
llm.deepinfra.chat-model=deepseek-ai/DeepSeek-V3
llm.deepinfra.vision-model=Qwen/Qwen3-VL-30B-A3B-Instruct
llm.timeout-minutes=2
llm.temperature=0.1
llm.chat.max-tokens=512
llm.vision.max-tokens=2048

rag.ingestion.max-segment-size=600
rag.ingestion.overlap=100
rag.retrieval.max-results=5
rag.retrieval.min-score=0.5
rag.retrieval.photo-max-results=20
rag.retrieval.recall-max-results=40
rag.retrieval.graph-max-results=15
rag.retrieval.photo-min-score=0.55
rag.retrieval.lexical-enabled=true
rag.retrieval.lexical-max-results=40
rag.retrieval.lexical-min-token-length=2
rag.graph.min-mention-confidence=0.75
rag.graph.min-fact-confidence=0.75
rag.query-planner.llm-fallback=true
rag.visual-match.context-accept-confidence=0.80
rag.visual-match.vision-accept-confidence=0.70
rag.visual-match.max-context-chars=5000
rag.visual-match.max-candidates=50
rag.visual-match.max-vision-analyses=20
rag.visual-retrieval.max-vector-candidates=40
rag.visual-retrieval.min-score=0.15
rag.visual-match.min-uncertain-source-confidence=0.20
rag.rerank.enabled=true
rag.rerank.max-candidates=20
rag.rerank.max-segment-chars=700
rag.chat.memory.max-tokens=5000
rag.max-segment-chars=1500

vision.structured.prompt=Analyze the whole image exhaustively and return strictly JSON only, without markdown. Identify every visible living participant (people, animals) without guessing identity or names; use stable labels such as person 1, person 2, animal 1. Capture every visible detail that may answer an unknown future question: appearance (hair, face, clothing, colours, accessories), pose, actions, interactions, objects, readable text, spatial layout, scene/context, lighting, background and approximate bounding boxes. For relations between participants and between participants and objects, use explicit spatial predicates such as left of, right of, next to, in front of, behind, above, below, holding, looking at. Do not invent unreadable text or details that are not visible. Prefer open natural-language predicates and values over a fixed vocabulary. Use this schema: {"entities":[{"label":"person 1","type":"PERSON","actions":["sitting"],"objects":["umbrella"],"nearby_objects":["table"],"visual_cues":["blond hair","blue shirt"],"nearby_text":["OPEN"],"bbox":[100,120,220,360]}],"relations":[{"subject_label":"person 1","relation":"left of","object_label":"person 2"},{"subject_label":"person 1","relation":"next to","object_label":"table"}],"scene":"living room","scene_summary":"Detailed scene description with every notable detail.","visible_texts":[{"text":"OPEN","bbox":[10,20,80,50],"near_entity_label":"person 1"}]}.
vision.image.max-width=1600
vision.image.max-height=1600
vision.structured.analyzer-version=${VISION_ANALYZER_VERSION:v4-spatial-detail}

face.service.url=${FACE_SERVICE_URL:http://localhost:8001}
face.service.enabled=${FACE_SERVICE_ENABLED:true}
face.match.threshold=${FACE_MATCH_THRESHOLD:0.50}
face.match.suggestion-threshold=${FACE_SUGGESTION_THRESHOLD:0.45}
face.match.min-margin=${FACE_MATCH_MIN_MARGIN:0.08}
face.match.min-det-score=${FACE_MIN_DET_SCORE:0.50}
face.match.batch-cluster-threshold=${FACE_BATCH_CLUSTER_THRESHOLD:0.48}
face.match.vector-search.enabled=${FACE_VECTOR_SEARCH_ENABLED:true}
face.match.vector-search.top-k=${FACE_VECTOR_SEARCH_TOP_K:40}
face.analyzer-version=${FACE_ANALYZER_VERSION:v2-person-gated}
identity.llm-matcher.enabled=${IDENTITY_LLM_MATCHER_ENABLED:false}
identity.llm-matcher.max-candidates=${IDENTITY_LLM_MATCHER_MAX_CANDIDATES:2}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
