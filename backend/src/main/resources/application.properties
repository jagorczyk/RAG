spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/vector_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

pgvector.host=${PGVECTOR_HOST:localhost}
pgvector.port=${PGVECTOR_PORT:5433}
pgvector.database=${PGVECTOR_DATABASE:vector_db}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.application.name=rag
logging.level.dev.langchain4j=DEBUG

openai.api.key=${OPENAI_API_KEY}
ollama.base.url=http://localhost:11434

chat.language.model=llama3.1
vision.language.model=minicpm-v
embedding.model=bge-m3


llm.provider=openai
llm.embedding.provider=ollama
llm.openai.base-url=https://api.groq.com/openai/v1
llm.openai.chat-model=meta-llama/llama-4-scout-17b-16e-instruct
llm.openai.vision-base-url=https://api.groq.com/openai/v1
llm.openai.vision-model=meta-llama/llama-4-scout-17b-16e-instruct
llm.openai.embedding-base-url=${llm.openai.base-url}
llm.openai.embedding-model=text-embedding-3-small
llm.timeout-minutes=2
llm.temperature=0.1

rag.ingestion.max-segment-size=600
rag.ingestion.overlap=100
rag.retrieval.max-results=5
rag.retrieval.min-score=0.5
rag.rerank.enabled=true
rag.rerank.max-candidates=10
rag.rerank.max-segment-chars=700
rag.chat.memory.max-tokens=5000
rag.max-segment-chars=1500

vision.prompt=What exactly is in this picture? Transcribe all visible codes, numbers, identifiers, and describe their meaning. Be very detailed. Respond in English.
vision.structured.prompt=Extract people, animals, actions, objects, visual cues and relations from this image. Output strictly as JSON. Supported relation values: NEXT_TO, LEFT_OF, RIGHT_OF, IN_FRONT_OF, BEHIND. Example: {"entities":[{"label":"Igor","type":"PERSON","actions":["sitting"],"objects":["chair"],"visual_cues":["blue shirt"]},{"label":"Pati","type":"PERSON","actions":["smiling"],"objects":[],"visual_cues":["long dark hair"]}],"relations":[{"subject_label":"Igor","relation":"NEXT_TO","object_label":"Pati"}],"scene":"living room"}. Do not use markdown blocks, return only JSON.
vision.image.max-width=800
vision.image.max-height=800

face.service.url=${FACE_SERVICE_URL:http://localhost:8001}
face.service.enabled=${FACE_SERVICE_ENABLED:true}
face.match.threshold=${FACE_MATCH_THRESHOLD:0.55}
face.match.suggestion-threshold=${FACE_SUGGESTION_THRESHOLD:0.50}
face.match.min-margin=${FACE_MATCH_MIN_MARGIN:0.08}
face.match.min-det-score=${FACE_MIN_DET_SCORE:0.50}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

