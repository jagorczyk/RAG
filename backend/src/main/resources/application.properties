spring.datasource.url=jdbc:postgresql://localhost:5433/vector_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.application.name=rag
logging.level.dev.langchain4j=DEBUG

ollama.base.url=http://localhost:11434

chat.language.model=llama3
vision.language.model=minicpm-v
embedding.model=bge-m3

yolo.model.path=models/yolov8s.onnx
textdetector.model.path=models/DB_TD500_resnet50.onnx

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB