# Opt-in latency experiment. Activate with SPRING_PROFILES_ACTIVE=perf.
# Only control-plane text calls are moved to the candidate model; answer and vision quality stay isolated.
llm.deepinfra.control-model=${LLM_CONTROL_MODEL:meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo}
llm.deepinfra.answer-model=${LLM_ANSWER_MODEL:deepseek-ai/DeepSeek-V3}
llm.deepinfra.attribution-model=${LLM_ATTRIBUTION_MODEL:deepseek-ai/DeepSeek-V3}
llm.answer.max-tokens=${LLM_ANSWER_MAX_TOKENS:384}

# Inspect GET /actuator/metrics/rag.llm.inference while running the experiment.
management.endpoints.web.exposure.include=health,info,metrics
management.metrics.tags.profile=perf
