services:
  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=vector_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  face-service:
    build: ./face-service
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  pgdata: